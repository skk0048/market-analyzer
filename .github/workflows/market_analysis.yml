# ════════════════════════════════════════════════════════════════════════════
#  FundaTechno Market Analysis — GitHub Actions v5.7
#
#  GOLDEN RULE: cron string in schedule: MUST match github.event.schedule ==
#  exactly — character for character, including spaces. One space off = skipped.
#
#  SCHEDULE (all times UTC):
#    India  Run 1 → 03:30 UTC = 09:00 AM IST
#    India  Run 2 → 06:00 UTC = 11:30 AM IST
#    India  Run 3 → 11:30 UTC = 05:00 PM IST
#    USA    Run 1 → 23:30 UTC = 05:00 AM IST next day
#    Scans  Run 1 → 03:00 UTC = 08:30 AM IST
#    Scans  Run 2 → 09:00 UTC = 02:30 PM IST
#
#  REQUIRED GITHUB SECRETS:
#    GOOGLE_CREDENTIALS        — service account JSON content
#    GOOGLE_SHEET_URL          — India sheet URL
#    GOOGLE_SHEET_URL_US       — US sheet URL
#    GOOGLE_SHEET_URL_SCANS    — Scans sheet URL
# ════════════════════════════════════════════════════════════════════════════

name: Market Analysis

on:
  schedule:
    # ── INDIA ──────────────────────────────────────────────────────────────
    - cron: "30 3 * * 1-5"    # India Run 1 → 03:30 UTC = 09:00 AM IST
    - cron: "0 6 * * 1-5"     # India Run 2 → 06:00 UTC = 11:30 AM IST
    - cron: "30 11 * * 1-5"   # India Run 3 → 11:30 UTC = 05:00 PM IST
    # ── USA ────────────────────────────────────────────────────────────────
    - cron: "30 23 * * 1-5"   # USA   Run 1 → 23:30 UTC = 05:00 AM IST
    # ── SCANS ──────────────────────────────────────────────────────────────
    - cron: "0 3 * * 1-5"     # Scans Run 1 → 03:00 UTC = 08:30 AM IST
    - cron: "0 9 * * 1-5"     # Scans Run 2 → 09:00 UTC = 02:30 PM IST

  workflow_dispatch:
    inputs:
      market:
        description: "Which market to run"
        required: false
        default: "all"
        type: choice
        options: [all, india, usa, scans]

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  run-india:
    name: India Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Runs on India crons OR manual trigger
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '30 3 * * 1-5'  ||
        github.event.schedule == '0 6 * * 1-5'   ||
        github.event.schedule == '30 11 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'india' ||
        github.event.inputs.market == 'all'
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run India analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: python market_india_gsht.py

      - name: Commit HTML output to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f India_Market_Analysis*.html || true
          git diff --staged --quiet || git commit -m "📊 India HTML update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

  # ──────────────────────────────────────────────────────────────────────────
  run-usa:
    name: USA Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 23 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'usa' ||
        github.event.inputs.market == 'all'
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run USA analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_US: ${{ secrets.GOOGLE_SHEET_URL_US }}
        run: python market_usa_gsht.py

      - name: Commit HTML output to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f USA_Market_Analysis*.html || true
          git diff --staged --quiet || git commit -m "📊 USA HTML update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

  # ──────────────────────────────────────────────────────────────────────────
  run-scans:
    name: Chartink Scans
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 3 * * 1-5'  ||
        github.event.schedule == '0 9 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'scans' ||
        github.event.inputs.market == 'all'
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run LongTerm scan
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_SCANS: ${{ secrets.GOOGLE_SHEET_URL_SCANS }}
        run: python LongTerm.py

      - name: Run FnO scan
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_SCANS: ${{ secrets.GOOGLE_SHEET_URL_SCANS }}
        run: python FnO.py

      # - name: Run Breakout scan
      #   env:
      #     GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
      #     GOOGLE_SHEET_URL_SCANS: ${{ secrets.GOOGLE_SHEET_URL_SCANS }}
      #   run: python Breakout.py

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

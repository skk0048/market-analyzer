name: Market Analysis — India + USA Daily Runner

# ──────────────────────────────────────────────────────────────────────────────
# SCHEDULE: 5:00 PM GST = 1:00 PM UTC weekdays (India post-close)
# For US data AFTER close: change cron to "0 17 * * 1-5" (9:00 PM GST)
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 13 * * 1-5"

  workflow_dispatch:
    inputs:
      market:
        description: "Which market to run"
        required: false
        default: "both"
        type: choice
        options: ["both", "india", "usa"]

# ── INDIA ─────────────────────────────────────────────────────────────────────
jobs:
  run-india:
    name: India Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.market == 'india' ||
      github.event.inputs.market == 'both'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore India price cache
        uses: actions/cache@v4
        with:
          path: ~/StockPriceCache
          key: india-cache-${{ runner.os }}-${{ hashFiles('market_analyzer_gsheets.py') }}
          restore-keys: india-cache-${{ runner.os }}-

      - name: Write credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run India analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          MARKET: INDIA
        run: python market_analyzer_gsheets.py

      - name: Save India price cache
        uses: actions/cache@v4
        if: always()
        with:
          path: ~/StockPriceCache
          key: india-cache-${{ runner.os }}-${{ hashFiles('market_analyzer_gsheets.py') }}

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

# ── USA ───────────────────────────────────────────────────────────────────────
  run-usa:
    name: USA Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.market == 'usa' ||
      github.event.inputs.market == 'both'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore USA price cache
        uses: actions/cache@v4
        with:
          path: ~/StockPriceCache
          key: usa-cache-${{ runner.os }}-${{ hashFiles('usa_market_analyzer_gsheets.py') }}
          restore-keys: usa-cache-${{ runner.os }}-

      - name: Write credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run USA analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_USA: ${{ secrets.GOOGLE_SHEET_URL_USA }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          MARKET: US
        run: python usa_market_analyzer_gsheets.py

      - name: Save USA price cache
        uses: actions/cache@v4
        if: always()
        with:
          path: ~/StockPriceCache
          key: usa-cache-${{ runner.os }}-${{ hashFiles('usa_market_analyzer_gsheets.py') }}

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

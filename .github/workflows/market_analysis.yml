# ════════════════════════════════════════════════════════════════════════════
#  FundaTechno Market Analysis — GitHub Actions v5.4
#
#  SCHEDULE (all times UTC):
#    India Run 1 → 04:30 UTC = 10:00 AM IST
#    India Run 2 → 09:00 UTC = 02:30 PM IST
#    India Run 3 → 11:30 UTC = 05:00 PM IST
#    USA   Run 1 → 21:30 UTC = 03:00 AM IST next day
#
#  GOLDEN RULE: The cron string in `schedule:` must be copied CHARACTER-FOR-CHARACTER
#  into the matching `github.event.schedule ==` check. One space difference = skipped.
#
#  HOW TO ADD MORE SCRIPTS IN FUTURE:
#    1. Add a new cron under `schedule:`
#    2. Add a new job with matching `if` condition
#    3. Change only the `run:` line to point to your new .py file
#
#  REQUIRED GITHUB SECRETS:
#    GOOGLE_CREDENTIALS     — service account JSON content
#    GOOGLE_SHEET_URL       — India sheet URL
#    GOOGLE_SHEET_URL_USA   — US sheet URL
# ════════════════════════════════════════════════════════════════════════════

name: Market Analysis

on:
  schedule:
    - cron: "30 4 * * 1-5"    # India Run 1 → 04:30 UTC = 10:00 AM IST
    - cron: "0 9 * * 1-5"     # India Run 2 → 09:00 UTC = 02:30 PM IST
    - cron: "30 11 * * 1-5"   # India Run 3 → 11:30 UTC = 05:00 PM IST
    - cron: "30 21 * * 1-5"   # USA   Run 1 → 21:30 UTC = 03:00 AM IST next day
  workflow_dispatch:
    inputs:
      market:
        description: "Which market to run (india / usa / both)"
        required: false
        default: "both"
        type: choice
        options: [both, india, usa]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  run-india:
    name: India Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '30 4 * * 1-5'  ||
        github.event.schedule == '0 9 * * 1-5'   ||
        github.event.schedule == '30 11 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'india' ||
        github.event.inputs.market == 'both'
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run India analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: python market_india_gsht.py

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

  # ─────────────────────────────────────────────────────────────────────────
  run-usa:
    name: USA Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 21 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'usa' ||
        github.event.inputs.market == 'both'
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run USA analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_USA: ${{ secrets.GOOGLE_SHEET_URL_USA }}
        run: python market_usa_gsht.py

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

